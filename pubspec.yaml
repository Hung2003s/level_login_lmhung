name: level_login_lmhung
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  uuid: ^4.5.3
  get_it: ^9.2.1
  get: ^4.7.3
  get_storage: ^2.1.1
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  cryptography: ^2.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true
    image: true
    rive: true
    lottie: true
  colors:
    inputs:
      - assets/colors/colors.xml

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/2x/
    - assets/images/3x/
    - assets/icons/
    - assets/colors/
